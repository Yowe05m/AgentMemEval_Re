provider:
  provider: mock
  model: mock-deterministic-v1
  temperature: 0.0
  max_output_tokens: 256
  timeout_seconds: 30
  max_retries: 0
  rate_limit_policy: none
  structured_output_mode: json_object

table:
  starting_stack: 1000
  small_blind: 1
  big_blind: 2
  max_raises_per_street: 4

agent:
  mechanism: fact
  memory_scope: per_agent
  top_k: 8
  window_size: 8
  sweep_every: 3
  evidence_k: 6
  max_records: 500

opponent_agent:
  mechanism: no_memory
  memory_scope: per_agent

heldout_agent:
  mechanism: no_memory
  memory_scope: per_agent

experiment:
  scenario: fixed_evolving_table
  seed: 20260705
  output_root: outputs
  # 论文默认为 train=150/test=25；smoke 配置使用更小手数保证离线测试快速。
  train_hands: 8
  test_hands: 4
  table_size: 4
  target_agent_id: agent_00
  update_memory_train: true
  update_memory_test: false
  all_agents_same_mechanism: false
